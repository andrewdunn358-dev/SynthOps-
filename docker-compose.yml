version: '3.8'

services:
  # SynthOps Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synthops-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=synthops
      - JWT_SECRET=${JWT_SECRET:-synthops-jwt-secret-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-synthops-encryption-32bytes!!}
      - TACTICAL_RMM_API_URL=${TACTICAL_RMM_API_URL}
      - TACTICAL_RMM_API_KEY=${TACTICAL_RMM_API_KEY}
      - ZAMMAD_API_URL=${ZAMMAD_API_URL}
      - ZAMMAD_API_TOKEN=${ZAMMAD_API_TOKEN}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY:-}
      - CORS_ORIGINS=*
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15}
    depends_on:
      - mongo
    networks:
      - synthops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SynthOps Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${FRONTEND_URL:-http://localhost}
    container_name: synthops-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - synthops-network
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: synthops-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - synthops-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mongo Express - Database Admin UI (optional)
  mongo-express:
    image: mongo-express:latest
    container_name: synthops-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-synthops123}
    depends_on:
      - mongo
    networks:
      - synthops-network
    profiles:
      - admin

  # Vaultwarden - Password Manager (optional)
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: synthops-vaultwarden
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN:-http://localhost:8082}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-}
      - SIGNUPS_ALLOWED=true
    volumes:
      - vaultwarden-data:/data
    networks:
      - synthops-network
    profiles:
      - extras

networks:
  synthops-network:
    driver: bridge

volumes:
  mongo-data:
  mongo-config:
  vaultwarden-data:
